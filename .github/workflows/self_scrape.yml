name: Self Scrape Prices

concurrency:
  group: scrape-prices
  cancel-in-progress: false

permissions:
  contents: read

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/30 0-13 * * *'
  workflow_dispatch: # allow manual run

jobs:
  scrape:
    runs-on: self-hosted

    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        shell: cmd
        run: npm ci --include=optional

      - name: Run scraper
        shell: cmd
        run: node scrape.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
